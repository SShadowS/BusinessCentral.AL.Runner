name: Coverage Demo

on:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build AlRunner/

      - name: Run tests with coverage
        run: |
          for test in 01-pure-function 02-record-operations 03-interface-injection 04-asserterror; do
            dotnet run --no-build --project AlRunner -- --coverage "tests/${test}/src" "tests/${test}/test"
            # Each run overwrites cobertura.xml — merge by appending
            mv cobertura.xml "cobertura-${test}.xml" 2>/dev/null || true
          done
          # Use the last one for the report (04-asserterror has 100% coverage)
          cp cobertura-04-asserterror.xml cobertura.xml

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: 'cobertura-*.xml'
          format: markdown
          output: both

      - name: Add to job summary
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: cobertura-*.xml
